name: Build Android APK (sideload)

# Builds a debug .apk you can download from the run's Artifacts and install on a
# phone (adb install app-debug.apk, or open the file on the device). Debug APKs
# are signed with Android's debug key, so they sideload without any signing setup.

on:
  workflow_dispatch: {} # manual "Run workflow" button
  push:
    branches: [capacitor-spike, main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 21
        # Capacitor's Gradle (8.14) needs JDK 17-21; newer JDKs are rejected.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        # Works whether or not android/ is committed: create it if missing, then sync.
        run: |
          [ -d android/app ] || npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mealplanner-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
