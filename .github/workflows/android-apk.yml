name: Build Android APK (sideload)

# Builds a debug .apk you can download from the run's Artifacts and install on a
# phone (adb install -r app-debug.apk, or open the file on the device).
#
# Installing over a previous build updates it in place and keeps the app's data.
# That relies on two things: the APK is signed with the keystore committed at
# android/debug.keystore (see android/app/build.gradle) rather than a throwaway
# key the runner would otherwise generate per run, and versionCode comes from
# the run number below, so it always climbs.

on:
  workflow_dispatch: {} # manual "Run workflow" button
  push:
    branches: [capacitor-spike, main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "android/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK 21
        # Capacitor's Gradle (8.14) needs JDK 17-21; newer JDKs are rejected.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        # Works whether or not android/ is committed: create it if missing, then sync.
        run: |
          [ -d android/app ] || npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        # github.run_number increments per run on this workflow, which is
        # exactly the monotonic versionCode an in-place update needs.
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -PappVersionCode=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          # Version in the name so downloaded APKs stay distinguishable.
          name: mealplanner-apk-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
